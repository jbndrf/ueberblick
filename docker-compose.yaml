version: '3.8'

# ============================================================
# Environment Variables (Self-Hosters / Local Build)
# ============================================================
# This compose builds images locally from source. For a Coolify-style
# deployment with prebuilt images + Traefik labels, see the template
# generated by compose-deployer/server_test.js (generateDockerCompose).
# Keep both in sync when adding env vars or changing service shape.
#
# Self-hosters: Create .env file from .env.example, docker-compose reads it
#
# Required variables (marked with :?):
#   - POCKETBASE_ADMIN_EMAIL
#   - POCKETBASE_ADMIN_PASSWORD
#
# Optional variables (have defaults with :-):
#   - BODY_SIZE_LIMIT (default: 1000M)
#   - SECURE_COOKIES (default: false; set true behind HTTPS)
#   - EXPOSE_PB_ADMIN (default: false)
#   - PB_BATCH_* settings
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # Self-hosters: Uncomment to set fixed container name
    container_name: pocketbase-backend
    environment:
      # Required: Admin credentials for first-run setup
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:?}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:?}
      # Optional: PocketBase Batch API settings
      - PB_BATCH_ENABLED=${PB_BATCH_ENABLED:-true}
      - PB_BATCH_MAX_REQUESTS=${PB_BATCH_MAX_REQUESTS:-10000}
      - PB_BATCH_TIMEOUT=${PB_BATCH_TIMEOUT:-30}
      - PB_BATCH_MAX_BODY_SIZE=${PB_BATCH_MAX_BODY_SIZE:-134217728}
    volumes:
      - ./data/pb_data:/pb/pb_data
    # Self-hosters: Uncomment to expose PocketBase directly on the host (for LAN admin UI access)
    # ports:
    #   - "8090:8090"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # Self-hosters: Uncomment to set fixed container name
    container_name: sveltekit-frontend
    environment:
      # Internal: Docker environment detection (do not change)
      - DOCKER_ENV=true
      # Required: Admin credentials
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:?}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:?}
      # Optional: Upload size limit
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-1000M}
      # Optional: Expose PocketBase admin UI at /_/ (default: false)
      - EXPOSE_PB_ADMIN=${EXPOSE_PB_ADMIN:-false}
      # Optional: Set to 'true' when behind HTTPS (production)
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
    volumes:
      - ./data/nginx_cache:/var/cache/nginx
      - ./data/app_data:/app/data
    # Self-hosters: Uncomment to expose on port 80 directly
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    # Add host.docker.internal to allow container to reach host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Use host DNS for proper LAN hostname resolution
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app-network:
#    Self-hosters: Uncomment for custom network config
    name: ueberblick-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-app
    ipam:
      config:
        - subnet: 172.27.0.0/16

volumes:
  nginx_cache:
