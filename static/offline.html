<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<title>Karte</title>
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
			body {
				font-family: system-ui, -apple-system, sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100dvh;
				background: #fff;
				color: #111;
			}
			@media (prefers-color-scheme: dark) {
				body { background: #0a0a0a; color: #eee; }
				.card { background: #171717; border-color: #333; }
			}
			.card {
				text-align: center;
				padding: 2rem;
				border: 1px solid #e5e5e5;
				border-radius: 0.75rem;
				max-width: 20rem;
			}
			h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
			p { font-size: 0.875rem; color: #666; margin-bottom: 1.5rem; }
			@media (prefers-color-scheme: dark) { p { color: #999; } }
			button {
				padding: 0.5rem 1.25rem;
				border-radius: 0.375rem;
				border: none;
				background: #111;
				color: #fff;
				font-size: 0.875rem;
				cursor: pointer;
			}
			@media (prefers-color-scheme: dark) { button { background: #eee; color: #111; } }
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Karte</h1>
			<p>The app is loading offline resources. If it doesn't redirect automatically, tap below.</p>
			<button onclick="window.location.replace('/participant/map')">Open Map</button>
		</div>
		<script>
			// If the real page is already in the runtime cache, redirect immediately.
			if ('caches' in window) {
				caches.open('pages-cache').then(function(cache) {
					cache.match('/participant/map').then(function(resp) {
						if (resp) window.location.replace('/participant/map');
					});
				});
			}
		</script>
	</body>
</html>
