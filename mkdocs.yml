site_name: Ueberblick Dokumentation
site_description: Konzepte, Tutorials und Feld-Referenz fuer Ueberblick / Ueberblick Sector
site_url: http://localhost:8000/
docs_dir: docs
site_dir: docs-site
use_directory_urls: true

theme:
  name: material
  language: de
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Dunkles Theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Helles Theme

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
      auto_append: []
      url_download: false

exclude_docs: |
  site/
  _history.md
  internal/
  /*.json

nav:
  - Start: index.md
  - Handbuch:
      - handbuch/index.md
      - Projekte: handbuch/projekte.md
      - Rollen & Teilnehmer: handbuch/rollen-und-teilnehmer.md
      - Zugriffskontrolle: handbuch/zugriffskontrolle.md
      - Workflows: handbuch/workflows.md
      - Formulare: handbuch/formulare.md
      - Tools: handbuch/tools.md
      - Automatisierungen: handbuch/automatisierungen.md
      - Karten: handbuch/karten.md
      - Custom Tables: handbuch/custom-tables.md
      - Offline & Sync: handbuch/offline-und-sync.md
      - Was sieht der Teilnehmer?: handbuch/teilnehmer-sicht.md
  - Tutorials:
      - tutorials/index.md
      - tutorials/01-projekt-einrichten.md
      - tutorials/02-erster-workflow.md
      - tutorials/03-formulare-und-tools.md
      - tutorials/04-automatisierungen.md
  - Reference:
      - Admin Cheatsheet: reference/admin-cheatsheet.md
      - Audit: reference/admin-cheatsheet-audit.md
  - Entwicklung:
      - dev/index.md
      - Architektur: dev/architecture.md
      - Setup: dev/getting-started.md
      - Konventionen: dev/conventions.md
      - Gotchas: dev/gotchas.md
